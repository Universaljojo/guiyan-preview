第一期聊魔力，第二期我去补了点功课，
第三期，回到这支等了很久的——贵烟（跨越）

为什么叫"跨越"？

它的官方传播语原话是这样的：
"跨越，是一种积极向上的人生态度，
是在逆境中勇敢者的选择，是前行途中自信的抉择"
——这名字不是随便起的，是把一种"往前走"的劲儿写在烟上

🌌 先看包装
黑底+浅灰，第一眼像太空
中间一颗"星芒"图案，是它的视觉记忆点
"贵烟"两个字烫金，凹凸的，手指摸过去能感觉到
官方原话："那深邃的黑，犹如无涯的太空"
"那浅浅的灰，恰似浩瀚的银河星光点点"
所以包装语言其实是——黑像太空，灰像银河

🍊 再看工艺
90mm 细支，焦油 7mg，烟碱 0.8mg
滤嘴里嵌一颗陈皮爆珠
不捏珠：抽到的是浓郁纯和的烟草本香
捏破珠：橘子的清香 + 一点点药香慢慢渗出来
（陈皮性温味苦，理气健脾、燥湿化痰，老一辈知道）

🌱 烟叶是贵州本地的喀斯特烟叶
高海拔、云雾多、昼夜温差大
养出来的烟叶有股清润的木香
跟陈皮爆珠的橘香药香，气质是同一路——沉、慢、有回甘

参数上属低焦细支
适合喜欢节奏慢一点的朋友
也适合懂陈皮的人尝个新鲜
最适合当贵州伴手礼了

—
下期预告：聊聊烟支长度——60mm vs 84mm vs 90mm 差在哪`,
    tags: ["#黔地识烟志", "#贵烟跨越", "#贵州烟", "#陈皮爆珠", "#细支烟", "#贵州伴手礼", "#烟草文化", "#每天认识一款烟"],

    body: `最近有朋友问我：
"贵烟里魔力是 60mm，跨越是 90mm，

专门做了功课，把烟支长度这事儿讲清楚 👇

📏 60mm 超细支（魔力是这个长度）
最细最短，烟支直径也细
特点：吸阻轻、节奏快
一支抽下来时间短，适合"碎片时间一支"
风味偏细腻，烟丝量少所以风味更聚焦

风味展开充分，从前段到尾段层次完整
适合：习惯传统中支的老烟民

}
function closeModal() {
  document.getElementById("modal").classList.remove("show");
  document.body.style.overflow = "";
}
function navSlide(dir) {

      <div class="slide-inner ${img.ratio}" data-cat="${p.cat}">
        <img class="real-img" src="imgs/post${padId}_p${i + 1}.png" onload="this.classList.add('loaded')" onerror="this.remove()">
        <span class="slide-label">${img.label}</span>
        <span class="slide-ratio-label">${img.ratio === 'r23' ? '2:3' : img.ratio === 'r32' ? '3:2' : '1:1'}</span>
        <div class="slide-prompt">${img.prompt}</div>
      </div>
    </div>
  `).join("");

  const dots = document.getElementById("dots");
  dots.innerHTML = p.images.map((_, i) => `<span class="dot ${i === 0 ? 'active' : ''}" onclick="jumpSlide(${i})"></span>`).join("");

  updateSlides();
  renderComments();
}

function jumpSlide(i) {
  currentSlide = i;
  updateSlides();
}

function updateSlides() {
  const n = currentPost.images.length;
  document.querySelectorAll(".slide").forEach((s, i) => {
    s.classList.toggle("active", i === currentSlide);
  });
  document.querySelectorAll(".dot").forEach((d, i) => {
    d.classList.toggle("active", i === currentSlide);
  });
  document.getElementById("prevBtn").disabled = currentSlide === 0;
  document.getElementById("nextBtn").disabled = currentSlide === n - 1;
}

document.getElementById("modal").addEventListener("click", (e) => {
  if (e.target.id === "modal") closeModal();
});
document.addEventListener("keydown", (e) => {
  if (!document.getElementById("modal").classList.contains("show")) return;
  if (e.key === "Escape") closeModal();
  if (e.key === "ArrowLeft") navSlide(-1);
  if (e.key === "ArrowRight") navSlide(1);
});

// ---------- Comments (localStorage) ----------
function getComments(postId) {
  const all = JSON.parse(localStorage.getItem('guiyan_comments') || '{}');
  return all[postId] || [];
}
function saveComments(postId, comments) {
  const all = JSON.parse(localStorage.getItem('guiyan_comments') || '{}');
  all[postId] = comments;
  localStorage.setItem('guiyan_comments', JSON.stringify(all));
}
function renderComments() {
  const list = document.getElementById('commentList');
  const comments = getComments(currentPost.id);
  list.innerHTML = comments.map((c, i) => `
    <div class="comment-item">
      <button class="comment-delete" onclick="deleteComment(${i})">×</button>
      <div>${c.text}</div>
      <div class="comment-time">${c.time}</div>
    </div>
  `).join('') || '<div style="font-size:12px;color:#bbb;padding:4px 0;">暂无备注</div>';
}
function addComment() {
  const input = document.getElementById('commentInput');
  const text = input.value.trim();
  if (!text) return;
  const comments = getComments(currentPost.id);
  comments.push({ text, time: new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' }) });
  saveComments(currentPost.id, comments);
  input.value = '';
  renderComments();
  syncCommentsToFile();
}
document.getElementById('commentInput').addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); addComment(); }
});
function deleteComment(idx) {
  const comments = getComments(currentPost.id);
  comments.splice(idx, 1);
  saveComments(currentPost.id, comments);
  renderComments();
  syncCommentsToFile();
}
function exportComments() {
  const all = JSON.parse(localStorage.getItem('guiyan_comments') || '{}');
  let text = '# 12篇预览 — 审稿备注\n\n';
  let hasAny = false;
  POSTS.forEach(p => {
    const comments = all[p.id];
    if (comments && comments.length) {
      hasAny = true;
      text += `## Post ${p.id}: ${p.title}\n`;
      comments.forEach(c => { text += `- ${c.text}  (${c.time})\n`; });
      text += '\n';
    }
  });
  if (!hasAny) { alert('还没有任何备注'); return; }
  const blob = new Blob([text], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = '审稿备注.md'; a.click();
  URL.revokeObjectURL(url);
}
function syncCommentsToFile() {
  const all = JSON.parse(localStorage.getItem('guiyan_comments') || '{}');
  const output = {};
  POSTS.forEach(p => {
    const comments = all[p.id];
    if (comments && comments.length) {
      output[p.id] = { title: p.title, comments };
    }
  });
  fetch('/save-comments', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(output)
  }).catch(() => {});
}
syncCommentsToFile();
</script>
